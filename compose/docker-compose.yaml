name: lab_env

x-nn-user: &nn_user
  user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"

services:
  sitl:
    <<: *nn_user
    image: "${SITL_IMAGE:-remote-sitl-lab/ardupilot-sitl:stage1-f10500ae45aa}"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      SITL_UPSTREAM_ENDPOINT: "${SITL_UPSTREAM_ENDPOINT:-mavlink-router:14550}"
      SITL_ROUTER_ONLY: "${SITL_ROUTER_ONLY:-false}"
      SITL_MODEL: "${SITL_MODEL:-quad}"
      SITL_SPEEDUP: "${SITL_SPEEDUP:-1}"
      SITL_INSTANCE: "${SITL_INSTANCE:-0}"
      SITL_HOME: "${SITL_HOME:-}"
      SITL_EXTRA_ARGS: "${SITL_EXTRA_ARGS:-}"
    volumes:
      - ./artifacts/sessions:/artifacts/sessions
      - ./profiles:/workspace/profiles:ro
      - ./docker/entrypoints/start-sitl.sh:/usr/local/bin/start-sitl.sh:ro
    command: [ "bash", "/usr/local/bin/start-sitl.sh" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -x arducopter >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    profiles: [ "base_env" ]
    depends_on:
      mavlink-router:
        condition: service_healthy
    networks:
      - mavlink-lab

  mavlink-router:
    <<: *nn_user
    image: "${ROUTER_IMAGE:-remote-sitl-lab/mavlink-router:stage1-4ee567d97525}"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROUTER_LISTEN: "${ROUTER_LISTEN:-0.0.0.0:14550}"
      ROUTER_TCP_PORT: "${ROUTER_TCP_PORT:-0}"
      ROUTER_DOWNSTREAM_ENDPOINTS: "${ROUTER_DOWNSTREAM_ENDPOINTS:-}"
    volumes:
      - ./artifacts/sessions:/artifacts/sessions
      - ./docker/entrypoints/start-mavlink-router.sh:/usr/local/bin/start-mavlink-router.sh:ro
    command: [ "bash", "/usr/local/bin/start-mavlink-router.sh" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -x mavlink-routerd >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    profiles: [ "base_env" ]
    networks:
      - mavlink-lab

  gazebo:
    <<: *nn_user
    image: remote-sitl-lab/gazebo-headless:latest
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      WORLD: "${GAZEBO_WORLD:-/workspace/worlds/uav_obstacle_5m.sdf}"
    volumes:
      - ./artifacts/ros:/artifacts/ros
      - ./docker/worlds:/workspace/worlds:ro
      - ./docker/models:/workspace/models:ro
      - ./docker/entrypoints/start-gazebo.sh:/usr/local/bin/start-gazebo.sh:ro
    command: [ "bash", "/usr/local/bin/start-gazebo.sh" ]
    profiles: [ "base_env", "x2_sensor" ]
    networks:
      - mavlink-lab

  scan-bridge:
    <<: *nn_user
    image: "${NAVLAB_COMPANION_IMAGE:-world-model/navlab-companion:latest}"
    network_mode: "service:gazebo"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      PYTHONPATH: "/workspace"
      CONFIG_FILE: "/workspace/docker/ros_gz_bridge/scan_bridge.yaml"
    volumes:
      - ./:/workspace:ro
      - ./docker/entrypoints/start-scan-bridge.sh:/usr/local/bin/start-scan-bridge.sh:ro
    command: [ "bash", "/usr/local/bin/start-scan-bridge.sh" ]
    profiles: [ "sim_p1" ]

  gazebo-sensor:
    <<: *nn_user
    image: "${NAVLAB_GAZEBO_SENSOR_IMAGE:-world-model/navlab-gazebo-sensor:latest}"
    network_mode: "service:gazebo"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      PYTHONPATH: "/workspace"
      X2_VIRTUAL_SERIAL_LINK: "${X2_VIRTUAL_SERIAL_LINK:-/tmp/navlab_x2}"
      X2_PROFILE_PATH: "${X2_PROFILE_PATH:-/workspace/profiles/x2-vendor-sim.yaml}"
      X2_STATUS_TOPIC: "${X2_STATUS_TOPIC:-/sim/x2/status}"
      X2_SCAN_SOURCE: "${X2_SCAN_SOURCE:-x2_virtual_serial}"
      X2_SCAN_IDEAL_TOPIC: "${X2_SCAN_IDEAL_TOPIC:-/scan_ideal}"
      X2_SCAN_TOPIC: "${X2_SCAN_TOPIC:-/scan}"
      X2_SCAN_FREQUENCY_HZ: "${X2_SCAN_FREQUENCY_HZ:-7.0}"
      X2_SAMPLE_RATE_HZ: "${X2_SAMPLE_RATE_HZ:-3000.0}"
      X2_RANGE_MIN_M: "${X2_RANGE_MIN_M:-0.1}"
      X2_RANGE_MAX_M: "${X2_RANGE_MAX_M:-8.0}"
      X2_STATIC_RANGE_M: "${X2_STATIC_RANGE_M:-1.5}"
      X2_RANGE_NOISE_STDDEV_M: "${X2_RANGE_NOISE_STDDEV_M:-0.0}"
      X2_DROPOUT_RATE: "${X2_DROPOUT_RATE:-0.0}"
      X2_AUTO_START: "${X2_AUTO_START:-false}"
      X2_MODE: "${X2_MODE:-runtime}"
      X2_SMOKE_DURATION_SEC: "${X2_SMOKE_DURATION_SEC:-15}"
      X2_ARTIFACT_DIR: "${X2_ARTIFACT_DIR:-/artifacts/ros/x2_driver_smoke/manual}"
      X2_STARTUP_TIMEOUT_SEC: "${X2_STARTUP_TIMEOUT_SEC:-20}"
    volumes:
      - ./:/workspace:ro
      - ./artifacts/ros:/artifacts/ros
      - ./docker/entrypoints/start-gazebo-sensor.sh:/usr/local/bin/start-gazebo-sensor.sh:ro
    command: [ "bash", "/usr/local/bin/start-gazebo-sensor.sh" ]
    profiles: [ "x2_sensor" ]
    depends_on:
      gazebo:
        condition: service_started

  foxglove:
    <<: *nn_user
    image: "${FOXGLOVE_IMAGE:-world-model/navlab-slam-cartographer:latest}"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      PYTHONPATH: "/workspace"
    volumes:
      - ./:/workspace:ro
      - ./docker/entrypoints/start-foxglove-bridge.sh:/usr/local/bin/start-foxglove-bridge.sh:ro
    command: [ "bash", "/usr/local/bin/start-foxglove-bridge.sh" ]
    ports:
      - "${FOXGLOVE_PUBLISHED_PORT:-8765}:8765"
    profiles: [ "base_env" ]
    networks:
      - mavlink-lab

  rosbag-play:
    <<: *nn_user
    image: remote-sitl-lab/ros-jazzy-base:latest
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      PLAY_BAG_DIR: "${PLAY_BAG_DIR:-/artifacts/ros/manual/rosbag}"
      PLAY_ARGS: "${PLAY_ARGS:---loop}"
    volumes:
      - ./artifacts/ros:/artifacts/ros
      - ./docker/entrypoints/start-rosbag-play.sh:/usr/local/bin/start-rosbag-play.sh:ro
    command: [ "bash", "/usr/local/bin/start-rosbag-play.sh" ]
    profiles: [ "rosbag_play" ]
    networks:
      - mavlink-lab

  fast-lio:
    <<: *nn_user
    image: "${FAST_LIO_IMAGE:-remote-sitl-lab/fast-lio:latest}"
    environment:
      SESSION_ID: "${SESSION_ID:-manual}"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
    volumes:
      - ./profiles:/workspace/profiles:ro
      - ./artifacts/ros:/artifacts/ros
      - ./docker/entrypoints/start-fast-lio.sh:/usr/local/bin/start-fast-lio.sh:ro
    command: [ "bash", "/usr/local/bin/start-fast-lio.sh" ]
    profiles: [ "fast-lio" ]
    networks:
      - mavlink-lab

networks:
  mavlink-lab:
    driver: bridge
