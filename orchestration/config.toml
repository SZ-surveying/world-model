[router]
image = "remote-sitl-lab/mavlink-router:stage1-4ee567d97525"
downstream_endpoints = "127.0.0.1:14552"
listen = "0.0.0.0:14550"
tcp_port = "5760"

[navlab.images]
tag_strategy = "latest"

[navlab.images.companion]
dockerfile = "docker/Dockerfile.companion"
context = "."
target = "navlab-companion"
repository = "world-model/navlab-companion"

[navlab.images.slam]
dockerfile = "docker/Dockerfile.slam"
context = "."
target = "navlab-slam-cartographer"
repository = "world-model/navlab-slam-cartographer"

[navlab.images.gazebo_sensor]
dockerfile = "docker/Dockerfile.gazebo-sensor"
context = "."
target = "navlab-gazebo-sensor"
repository = "world-model/navlab-gazebo-sensor"

[navlab.images.official_baseline]
dockerfile = "docker/Dockerfile.official-baseline"
context = "."
target = "navlab-official-baseline"
repository = "world-model/navlab-official-baseline"

session_id = "navlab_companion_sitl_gazebo"
ros_domain_id = "85"
gazebo_world = "/workspace/worlds/navlab_iq_quad_figure8.sdf"
rosbag_profile = "profiles/navlab-rosbag-topics.txt"

[sitl]
image = "remote-sitl-lab/ardupilot-sitl:stage1-f10500ae45aa"
model = "JSON"
speedup = "1"
instance = "0"
home = ""
upstream_endpoint = "mavlink-router:14550"
router_only = "false"
extra_args = [
  "--defaults",
  "/workspace/profiles/navlab-sitl-external-nav.parm",
]

[sensor]
scan_source = "x2_virtual_serial"

[slam]
autostart = true
backend = "cartographer"
runtime_config = "/workspace/navlab/config.toml"

[official_baseline]
rosbag_profile = "profiles/navlab-official-baseline-rosbag-topics.txt"
dds_enable = "1"
dds_domain_id = "0"
rmw_implementation = "rmw_cyclonedds_cpp"
expected_ap_node = "/ap"
required_ap_topics = ["/ap/v1/time"]
runtime_image = "world-model/navlab-official-baseline:latest"
required_ros_packages = [
  "ardupilot_sitl",
  "ardupilot_msgs",
  "ardupilot_dds_tests",
  "micro_ros_agent",
  "ardupilot_gz_bringup",
  "ardupilot_gz_application",
  "ardupilot_gazebo",
  "ardupilot_gz_gazebo",
  "ardupilot_sitl_models",
  "ardupilot_cartographer",
]
micro_ros_agent_binaries = ["MicroXRCEAgent", "micro_ros_agent"]
sitl_launch = "ros2 launch ardupilot_sitl sitl_dds_udp.launch.py"
gazebo_launch = "ros2 launch ardupilot_gz_bringup iris_maze.launch.py"
cartographer_launch = "ros2 launch ardupilot_cartographer cartographer.launch.py"
gazebo_bringup_mode = "official_gz_bringup"
external_nav_route = "official_dds"

[official_maze_x2]
rosbag_profile = "profiles/navlab-official-maze-x2-rosbag-topics.txt"
world_source = "official_iris_maze"
vehicle_model_source = "official_iris_with_lidar"
gazebo_lidar_topic = "/lidar"
x2_scan_input_topic = "/lidar"
x2_scan_topic = "/scan"
x2_status_topic = "/sim/x2/status"
x2_virtual_serial_link = "/tmp/navlab_p1_x2"
altitude_control_claim = "not_evaluated"
hover_claim = "not_evaluated"
cartographer_launch = "ros2 launch ardupilot_cartographer cartographer.launch.py"

[rangefinder_imu]
rosbag_profile = "profiles/navlab-rangefinder-imu-rosbag-topics.txt"
world_source = "official_iris_maze"
vehicle_model_source = "official_iris_with_lidar"
model_overlay_source = "official_iris_with_lidar_plus_down_rangefinder"
gazebo_lidar_topic = "/lidar"
x2_scan_input_topic = "/navlab/x2/scan_ideal"
x2_scan_topic = "/scan"
x2_status_topic = "/sim/x2/status"
x2_virtual_serial_link = "/tmp/navlab_p2_x2"
rangefinder_scan_ideal_topic = "/rangefinder/down/scan_ideal"
rangefinder_range_topic = "/rangefinder/down/range"
rangefinder_status_topic = "/rangefinder/down/status"
rangefinder_frame_id = "rangefinder_down_frame"
rangefinder_model_pose = "0 0 -0.02 0 1.5707963267948966 0"
rangefinder_model_update_rate_hz = 20.0
rangefinder_model_ray_count = "1"
rangefinder_model_noise_stddev_m = 0.0
rangefinder_endpoint = "udpin:0.0.0.0:14550"
rangefinder_fcu_probe_endpoint = "udpin:0.0.0.0:14551"
rangefinder_mavlink_orientation = "MAV_SENSOR_ROTATION_PITCH_270"
rangefinder_source_system = "1"
rangefinder_source_component = "158"
rangefinder_sensor_id = "1"
rangefinder_rate_hz = 20.0
rangefinder_min_distance_m = 0.05
rangefinder_max_distance_m = 6.0
rangefinder_covariance_cm = "2"
imu_source_route = "official_gazebo_imu_bridge"
imu_source_topic = "/imu"
imu_output_topic = "/imu"
imu_status_topic = "/imu/status"
imu_frame_id = "imu_link"
imu_min_rate_hz = 4.0
synthetic_fallback_enabled = false
altitude_control_claim = "not_evaluated"
hover_claim = "not_evaluated"
cartographer_launch = "ros2 launch ardupilot_cartographer cartographer.launch.py"

[foxglove_upload]
enabled = true
api_url = "https://api.foxglove.dev/v1"
token_env = "FOXGLOVE_API_TOKEN"
project_id = ""
device_id = ""
device_name = "navlab_companion_sitl_gazebo"
key_prefix = "navlab"
filename_prefix = "navlab"
