name: Main Validation

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/main-validation.yml"
      - ".golangci.yml"
      - "devbox.json"
      - "devbox.lock"
      - "pyproject.toml"
      - "uv.lock"
      - "lefthook.yml"
      - "justfile"
      - "navlab/**"
      - "contracts/**"
      - "orchestration/**"
      - "scripts/command/**"
      - "scripts/contracts/**"
      - "scripts/ops/**"
      - "scripts/quality/**"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/main-validation.yml"
      - ".golangci.yml"
      - "devbox.json"
      - "devbox.lock"
      - "pyproject.toml"
      - "uv.lock"
      - "lefthook.yml"
      - "justfile"
      - "navlab/**"
      - "contracts/**"
      - "orchestration/**"
      - "scripts/command/**"
      - "scripts/contracts/**"
      - "scripts/ops/**"
      - "scripts/quality/**"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '.github/workflows/main-validation.yml'
              - 'scripts/quality/check-python.sh'
              - 'scripts/quality/format-python.sh'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'lefthook.yml'
              - 'justfile'
              - 'navlab/**'
              - 'scripts/command/**'
              - 'scripts/ops/**/*.py'
            go:
              - '.github/workflows/main-validation.yml'
              - '.golangci.yml'
              - 'devbox.json'
              - 'devbox.lock'
              - 'lefthook.yml'
              - 'justfile'
              - 'scripts/quality/check-go.sh'
              - 'scripts/quality/format-go.sh'
              - 'orchestration/sim/**'
            rust:
              - '.github/workflows/main-validation.yml'
              - 'lefthook.yml'
              - 'justfile'
              - 'scripts/quality/check-rust.sh'
              - 'scripts/quality/format-rust.sh'
              - 'orchestration/real/**'
            contracts:
              - '.github/workflows/main-validation.yml'
              - 'scripts/quality/check-contracts.sh'
              - 'scripts/contracts/**'
              - 'contracts/**'

  contracts:
    name: Contracts CI
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install contract tools
        run: |
          sudo apt-get update && sudo apt-get install -y jq protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python contract runtime
        run: python -m pip install 'protobuf>=5.29,<6'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run contract checks
        run: ./scripts/quality/check-contracts.sh

  python:
    name: Python CI
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Run Python checks
        env:
          PYTHON_CHECK_PROFILE: ci
        run: ./scripts/quality/check-python.sh

  go:
    name: Go CI
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: orchestration/sim/go.mod

      - name: Run Go checks
        env:
          GO_ALLOW_BOOTSTRAP: "1"
          GO_CHECK_PROFILE: ci
        run: ./scripts/quality/check-go.sh

  rust:
    name: Rust CI
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy

      - name: Run Rust checks
        env:
          RUST_CHECK_PROFILE: ci
        run: ./scripts/quality/check-rust.sh

  summary:
    name: Validation Summary
    if: always()
    needs:
      - changes
      - contracts
      - python
      - go
      - rust
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          PYTHON_CHANGED: ${{ needs.changes.outputs.python }}
          PYTHON_RESULT: ${{ needs.python.result }}
          CONTRACTS_CHANGED: ${{ needs.changes.outputs.contracts }}
          CONTRACTS_RESULT: ${{ needs.contracts.result }}
          GO_CHANGED: ${{ needs.changes.outputs.go }}
          GO_RESULT: ${{ needs.go.result }}
          RUST_CHANGED: ${{ needs.changes.outputs.rust }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          label_for() {
            local changed="$1"
            local result="$2"

            if [ "$changed" != "true" ]; then
              echo "⚪ skipped"
              return
            fi

            case "$result" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "🟡 cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "🟣 $result" ;;
            esac
          }

          PYTHON_STATUS="$(label_for "$PYTHON_CHANGED" "$PYTHON_RESULT")"
          CONTRACTS_STATUS="$(label_for "$CONTRACTS_CHANGED" "$CONTRACTS_RESULT")"
          GO_STATUS="$(label_for "$GO_CHANGED" "$GO_RESULT")"
          RUST_STATUS="$(label_for "$RUST_CHANGED" "$RUST_RESULT")"

          {
            echo "## Main Validation Summary"
            echo
            echo "| Area | Changed | Result |"
            echo "| --- | --- | --- |"
            if [ "$CONTRACTS_CHANGED" = "true" ]; then
              echo "| contracts | yes | $CONTRACTS_STATUS |"
            else
              echo "| contracts | no | $CONTRACTS_STATUS |"
            fi
            if [ "$PYTHON_CHANGED" = "true" ]; then
              echo "| python | yes | $PYTHON_STATUS |"
            else
              echo "| python | no | $PYTHON_STATUS |"
            fi
            if [ "$GO_CHANGED" = "true" ]; then
              echo "| go | yes | $GO_STATUS |"
            else
              echo "| go | no | $GO_STATUS |"
            fi
            if [ "$RUST_CHANGED" = "true" ]; then
              echo "| rust | yes | $RUST_STATUS |"
            else
              echo "| rust | no | $RUST_STATUS |"
            fi
            echo
            echo "Notes:"
            echo "- \`Changed = no\` means validation was skipped because no matching files changed."
          } >> "$GITHUB_STEP_SUMMARY"
