[orchestration]
session_id = "navlab_companion_sitl_gazebo"
ros_domain_id = "85"
gazebo_world = "/workspace/worlds/uav_obstacle_5m.sdf"
rosbag_profile = "profiles/navlab-rosbag-topics.txt"

[orchestration.sitl]
image = "remote-sitl-lab/ardupilot-sitl:stage1-f10500ae45aa"
model = "quad"
speedup = "1"
instance = "0"
home = ""
upstream_endpoint = "mavlink-router:14550"
router_only = "false"
extra_args = [
  "--defaults",
  "/workspace/profiles/navlab-sitl-external-nav.parm",
  "--serial1",
  "none",
  "--serial2",
  "none",
]

[orchestration.router]
image = "remote-sitl-lab/mavlink-router:stage1-4ee567d97525"
downstream_endpoints = "127.0.0.1:14552"
listen = "0.0.0.0:14550"
tcp_port = "5760"

[orchestration.sensor]
scan_source = "x2_virtual_serial"
profile_path = "/workspace/profiles/x2-vendor-sim.yaml"
virtual_serial_link = "/tmp/navlab_x2"
scan_ideal_topic = "/scan_ideal"
scan_topic = "/scan"
status_topic = "/sim/x2/status"
range_noise_stddev_m = "0.0"
dropout_rate = "0.0"

[orchestration.slam]
autostart = true
backend = "cartographer"
imu_source_topic = "/navlab/fcu_imu/data"
imu_source_label = "fcu_mavlink_navlab"
imu_min_input_rate_hz = "2.0"
args = []

[orchestration.foxglove_upload]
enabled = true
api_url = "https://api.foxglove.dev/v1"
token_env = "FOXGLOVE_API_TOKEN"
project_id = ""
device_id = ""
device_name = "navlab_companion_sitl_gazebo"
key_prefix = "navlab"
filename_prefix = "navlab"

[runtime]
imu_source_label = "fcu_mavlink_navlab"

[runtime.world_markers]
autostart = true
args = [
  "--world-file",
  "/workspace/docker/worlds/uav_obstacle_5m.sdf",
  "--topic",
  "/sim/markers",
  "--pose-topic",
  "/sim/uav_pose",
  "--rate",
  "1",
]

[runtime.scan_features]
autostart = true
args = []

[runtime.pose_mirror]
autostart = true
endpoint = "tcp:mavlink-router:5760"
args = [
  "--imu-topic",
  "/navlab/fcu_imu/data",
  "--imu-status-topic",
  "/navlab/fcu_imu/status",
  "--imu-frame-id",
  "imu_link",
  "--synthetic-imu-when-mavlink-missing",
  "--simulate-pose-from-mission-status",
  "--rate-hz",
  "10",
]

[runtime.imu_bridge]
autostart = false
endpoint = "tcp:mavlink-router:5760"
args = ["--allow-raw-imu"]

[runtime.external_nav_sender]
autostart = true
endpoint = "tcp:mavlink-router:5760"
args = ["--rate-hz", "20"]

[runtime.mission]
autostart = false
endpoint = "tcp:mavlink-router:5760"
args = ["--simulate-mode-arm"]
